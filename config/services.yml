services:
    alfredoramos.hcaptcha.listener:
        class: alfredoramos\hcaptcha\event\listener
        arguments:
            - '@alfredoramos.hcaptcha.helper'
        tags:
            - { name: event.listener }

    alfredoramos.hcaptcha.helper:
        class: alfredoramos\hcaptcha\includes\helper
        arguments:
            - '@config'
            - '@language'
            - '@template'
            - '@captcha.factory'

    alfredoramos.hcaptcha.captcha.hcaptcha:
        class: alfredoramos\hcaptcha\captcha\plugins\hcaptcha
        arguments:
            - '@config'
            - '@user'
            - '@request'
            - '@template'
            - '@language'
            - '@log'
            - '@alfredoramos.hcaptcha.helper'
            - '%core.root_path%'
            - '%core.php_ext%'
        calls:
            - ['set_name', ['alfredoramos.hcaptcha.captcha.hcaptcha']]
        tags:
            - { name: captcha.plugins }
